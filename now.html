<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Now — Noah Peters</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="js/vendor/jsvectormap.min.css" />
  <style>
    .reading-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      gap: 1rem;
    }
    .reading-item:last-child { border-bottom: none; }
    .book-title { font-size: 0.9rem; color: var(--text); }
    .book-author { font-size: 0.82rem; color: var(--text-muted); }
    .goal-item {
      padding: 0.5rem 0 0.5rem 1.2rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
      color: var(--text-muted);
      position: relative;
    }
    .goal-item::before {
      content: '◦';
      position: absolute;
      left: 0;
      color: var(--accent);
    }
    .goal-item:last-child { border-bottom: none; }
    .learning-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .chip {
      font-size: 0.8rem;
      font-family: var(--font-mono);
      background: var(--bg-alt);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
    }
    .updated {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
    }
    .map-label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .map-count {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      margin-left: 0.4rem;
    }
    .map-container {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-alt);
      overflow: hidden;
      margin-bottom: 2rem;
    }
    #us-map    { /* height driven by SVG aspect ratio */ }
    #us-map svg { display: block; width: 100%; height: auto; }
    #world-map { height: 300px; }
    .state-path { cursor: pointer; transition: fill 0.12s; }
    #us-tooltip {
      position: fixed;
      display: none;
      background: var(--text);
      color: var(--bg);
      font-family: var(--font-mono);
      font-size: 0.74rem;
      padding: 0.22rem 0.55rem;
      border-radius: 2px;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }
    .jsvectormap-tooltip {
      font-family: var(--font-mono) !important;
      font-size: 0.75rem !important;
      background: var(--text) !important;
      color: var(--bg) !important;
      border: none !important;
      border-radius: 2px !important;
      padding: 0.25rem 0.6rem !important;
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-name" href="index.html">NP</a>
  <ul>
    <li><a href="now.html" class="active">Now</a></li>
    <li><a href="learning.html">Learning</a></li>
    <li><a href="work.html">Work</a></li>
    <li><a href="research.html">Research</a></li>
  </ul>
</nav>

<main>
  <h1>Now</h1>
  <div class="typewriter" id="typewriter"></div>
  <p class="updated" id="updated"></p>

  <h2>Working On</h2>
  <div id="working-on"></div>

  <h2>Currently Learning</h2>
  <div class="learning-chips" id="learning-chips"></div>

  <h2>Reading</h2>
  <div id="reading"></div>

  <h2>Goals</h2>
  <div id="goals"></div>

  <h2>Places</h2>
  <div class="map-label" id="us-label"></div>
  <div id="us-map" class="map-container"></div>
  <div class="map-label" id="world-label"></div>
  <div id="world-map" class="map-container"></div>
</main>

<div id="us-tooltip"></div>
<footer>Noah Peters</footer>

<script src="js/typewriter.js"></script>
<script src="js/vendor/jsvectormap.min.js"></script>
<script src="js/vendor/jsvectormap-world.js"></script>
<script src="js/vendor/topojson-client.min.js"></script>
<script src="js/vendor/d3-array.min.js"></script>
<script src="js/vendor/d3-geo.min.js"></script>
<script>
  const COUNTRY_CODES = {
    'Afghanistan':'AF','Albania':'AL','Algeria':'DZ','Angola':'AO','Argentina':'AR',
    'Armenia':'AM','Australia':'AU','Austria':'AT','Azerbaijan':'AZ','Bahrain':'BH',
    'Bangladesh':'BD','Belarus':'BY','Belgium':'BE','Belize':'BZ','Benin':'BJ',
    'Bolivia':'BO','Bosnia and Herzegovina':'BA','Botswana':'BW','Brazil':'BR',
    'Bulgaria':'BG','Cambodia':'KH','Cameroon':'CM','Canada':'CA','Chile':'CL',
    'China':'CN','Colombia':'CO','Costa Rica':'CR','Croatia':'HR','Cuba':'CU',
    'Czech Republic':'CZ','Denmark':'DK','Dominican Republic':'DO','Ecuador':'EC',
    'Egypt':'EG','El Salvador':'SV','England':'GB','Estonia':'EE','Ethiopia':'ET',
    'Finland':'FI','France':'FR','Georgia':'GE','Germany':'DE','Ghana':'GH',
    'Greece':'GR','Guatemala':'GT','Honduras':'HN','Hungary':'HU','Iceland':'IS',
    'India':'IN','Indonesia':'ID','Iran':'IR','Iraq':'IQ','Republic of Ireland':'IE',
    'Israel':'IL','Italy':'IT','Jamaica':'JM','Japan':'JP','Jordan':'JO',
    'Kazakhstan':'KZ','Kenya':'KE','Kosovo':'XK','Latvia':'LV','Lebanon':'LB',
    'Libya':'LY','Liechtenstein':'LI','Lithuania':'LT','Luxembourg':'LU',
    'Malaysia':'MY','Mali':'ML','Mexico':'MX','Moldova':'MD','Mongolia':'MN',
    'Morocco':'MA','Mozambique':'MZ','Myanmar':'MM','Nepal':'NP','Netherlands':'NL',
    'New Zealand':'NZ','Nicaragua':'NI','Nigeria':'NG','North Korea':'KP',
    'Norway':'NO','Pakistan':'PK','Panama':'PA','Paraguay':'PY','Peru':'PE',
    'Philippines':'PH','Poland':'PL','Portugal':'PT','Romania':'RO','Russia':'RU',
    'Saudi Arabia':'SA','Scotland':'GB','Senegal':'SN','Serbia':'RS','Singapore':'SG',
    'Slovakia':'SK','Slovenia':'SI','Somalia':'SO','South Africa':'ZA',
    'South Korea':'KR','Spain':'ES','Sudan':'SD','Sweden':'SE','Switzerland':'CH',
    'Syria':'SY','Taiwan':'TW','Tanzania':'TZ','Thailand':'TH','Tunisia':'TN',
    'Turkey':'TR','Uganda':'UG','Ukraine':'UA','United Arab Emirates':'AE',
    'United Kingdom':'GB','United States':'US','Uruguay':'UY','Uzbekistan':'UZ',
    'Venezuela':'VE','Vietnam':'VN','Wales':'GB','Yemen':'YE','Zambia':'ZM',
    'Zimbabwe':'ZW'
  };

  const mapStyle = {
    initial:      { fill: '#efece4', stroke: '#d8d4c8', strokeWidth: 0.4 },
    selected:     { fill: '#3d6b4f' },
    hover:        { fillOpacity: 0.75 },
    selectedHover:{ fill: '#4d7b5f' }
  };

  fetch('data/now.json')
    .then(r => r.json())
    .then(d => {
      document.getElementById('updated').textContent = `Last updated: ${d.updated}`;

      typewriter(document.getElementById('typewriter'),
        ['What I am doing right now.'], { speed: 40, pause: 99999 });

      // Working on
      const wo = document.getElementById('working-on');
      d.working_on.forEach(item => {
        wo.innerHTML += `
          <div class="entry">
            <div class="entry-meta">
              ${item.title}
              <span class="status status-active">${item.status}</span>
            </div>
            <p class="entry-desc">${item.description}</p>
          </div>`;
      });

      // Learning chips
      const chips = document.getElementById('learning-chips');
      d.learning.forEach(l => {
        chips.innerHTML += `<span class="chip">${l}</span>`;
      });

      // Reading
      const reading = document.getElementById('reading');
      d.reading.forEach(b => {
        const statusClass = b.status === 'reading' ? 'status-reading'
          : b.status === 'read' ? 'status-done' : 'status-want';
        const statusLabel = b.status === 'want to read' ? 'want to read' : b.status;
        reading.innerHTML += `
          <div class="reading-item">
            <div>
              <div class="book-title">${b.title}</div>
              <div class="book-author">${b.author}</div>
            </div>
            <span class="status ${statusClass}">${statusLabel}</span>
          </div>`;
      });

      // Goals
      const goals = document.getElementById('goals');
      d.goals.forEach(g => {
        goals.innerHTML += `<div class="goal-item">${g}</div>`;
      });

      // Places — maps
      document.getElementById('us-label').innerHTML =
        `States <span class="map-count">${d.places.states.length}</span>`;
      document.getElementById('world-label').innerHTML =
        `Countries <span class="map-count">${d.places.countries.length}</span>`;

      // US states map via d3-geo + topojson
      const tip = document.getElementById('us-tooltip');
      fetch('js/vendor/states-10m.json')
        .then(r => r.json())
        .then(us => {
          const features = topojson.feature(us, us.objects.states).features;
          const W = 960, H = 600;
          const projection = d3.geoAlbersUsa().fitSize([W, H], { type: 'FeatureCollection', features });
          const path = d3.geoPath().projection(projection);

          const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
          svg.setAttribute('width', '100%');
          svg.setAttribute('height', 'auto');
          svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

          features.forEach(f => {
            const d_attr = path(f);
            if (!d_attr) return;
            const visited = d.places.states.includes(f.properties.name);
            const fillBase   = visited ? '#3d6b4f' : '#efece4';
            const fillHover  = visited ? '#4d8b62' : '#dedad0';

            const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            el.setAttribute('d', d_attr);
            el.setAttribute('fill', fillBase);
            el.setAttribute('stroke', '#d8d4c8');
            el.setAttribute('stroke-width', '0.8');
            el.classList.add('state-path');

            el.addEventListener('mouseenter', () => {
              el.setAttribute('fill', fillHover);
            });
            el.addEventListener('mousemove', e => {
              tip.textContent = f.properties.name + (visited ? ' ✓' : '');
              tip.style.display = 'block';
              tip.style.left = (e.clientX + 14) + 'px';
              tip.style.top  = (e.clientY - 32) + 'px';
            });
            el.addEventListener('mouseleave', () => {
              el.setAttribute('fill', fillBase);
              tip.style.display = 'none';
            });

            svg.appendChild(el);
          });

          const usContainer = document.getElementById('us-map');
          usContainer.innerHTML = '';
          usContainer.appendChild(svg);
        });

      // World map via jsvectormap
      const visitedCountries = [...new Set(d.places.countries.map(c => COUNTRY_CODES[c]).filter(Boolean))];

      // Reverse lookup: ISO code → display name
      const CODE_TO_NAME = {};
      Object.entries(COUNTRY_CODES).forEach(([name, code]) => {
        if (!CODE_TO_NAME[code]) CODE_TO_NAME[code] = name;
      });

      new jsVectorMap({
        map: 'world',
        selector: '#world-map',
        selectedRegions: visitedCountries,
        regionsSelectable: false,
        zoomButtons: false,
        zoomOnScroll: false,
        regionStyle: mapStyle,
        onRegionTooltipShow(event, tooltip) {
          tooltip.hide();
        }
      });

      // Custom tooltip via direct DOM delegation on data-code paths
      const worldEl = document.getElementById('world-map');
      worldEl.addEventListener('mousemove', e => {
        const path = e.target.closest('[data-code]');
        if (path) {
          const code = path.getAttribute('data-code');
          const name = CODE_TO_NAME[code] || code;
          const visited = visitedCountries.includes(code);
          tip.textContent = name + (visited ? ' ✓' : '');
          tip.style.display = 'block';
          tip.style.left = (e.clientX + 14) + 'px';
          tip.style.top  = (e.clientY - 32) + 'px';
        } else {
          tip.style.display = 'none';
        }
      });
      worldEl.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
    });
</script>
</body>
</html>
